name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install development dependencies
        run: python -m pip install -r requirements/dev.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Compile Python sources
        run: python -m compileall src tests

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Path . -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$tokens, [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$($_.Extent.File): $($_.Message)" }
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

  linux-deploy-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate shell scripts
        run: find deploy -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Validate systemd units
        run: systemd-analyze verify deploy/*.service deploy/*.mount deploy/*.automount deploy/*.timer
