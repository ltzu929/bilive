<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bilive dashboard</title>
    <link rel="stylesheet" href="/styles.css?v=20260602" />
    <script src="/cache-reset.js"></script>
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">B</div>
          <span class="brand-text">bilive</span>
        </div>
        <nav>
          <a class="nav-item" href="http://192.168.31.157:2233/tasks">
            <span class="nav-icon" data-icon="record"></span>
            <span class="nav-text">&#24405;&#25773;&#25511;&#21046;&#21488;</span>
          </a>
          <a class="nav-item active" href="/tasks">
            <span class="nav-icon" data-icon="scissor"></span>
            <span class="nav-text">&#20999;&#29255;</span>
          </a>
          <span class="nav-item disabled" aria-disabled="true">
            <span class="nav-icon" data-icon="upload"></span>
            <span class="nav-text">&#19978;&#20256;</span>
          </span>
          <span class="nav-item disabled" aria-disabled="true">
            <span class="nav-icon" data-icon="setting"></span>
            <span class="nav-text">&#35774;&#32622;</span>
          </span>
        </nav>
        <div class="sider-trigger" id="sider-toggle" role="button" aria-label="collapse sidebar">
          <span class="nav-icon" data-icon="fold"></span>
        </div>
      </aside>
      <main class="main">
        <section class="page">
          <header class="toolbar">
            <div class="toolbar-left">
              <nav class="breadcrumb" aria-label="breadcrumb">
                <span class="breadcrumb-item">bilive</span>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-item current">&#20999;&#29255;</span>
              </nav>
              <h1>&#20999;&#29255;</h1>
              <p>&#39044;&#35272;&#20505;&#36873;&#29255;&#27573;&#65292;&#35760;&#24405;&#20445;&#30041;&#12289;&#20002;&#24323;&#21644;&#24453;&#31934;&#20999;&#21028;&#26029;&#12290;</p>
            </div>
            <div class="toolbar-controls">
              <select id="room-filter">
                <option value="">&#20840;&#37096; UP</option>
              </select>
              <select id="status-filter">
                <option value="all">&#20840;&#37096;</option>
                <option value="review">&#24453;&#30830;&#35748;</option>
                <option value="keep">&#20445;&#30041;</option>
                <option value="drop">&#20002;&#24323;</option>
              </select>
              <span id="worker-badge" class="worker-badge worker-idle" title="PC worker 状态">PC worker: 未知</span>
              <button id="start-slice-button" class="btn-primary" type="button">启动切片</button>
              <button id="refresh-button" type="button">&#21047;&#26032;</button>
            </div>
          </header>

          <section id="slice-progress-panel" class="progress-panel" aria-live="polite">
            <div class="progress-main">
              <div>
                <div id="slice-progress-title" class="progress-title">空闲</div>
                <div id="slice-progress-message" class="progress-message">暂无切片任务</div>
              </div>
              <div class="progress-meta">
                <span id="slice-progress-source">-</span>
                <span id="slice-progress-count">0/0</span>
                <span id="slice-progress-percent">0%</span>
              </div>
            </div>
            <div class="progress-track">
              <div id="slice-progress-bar" class="progress-fill" style="width: 0%"></div>
            </div>
          </section>

          <section id="slice-diagnostics-panel" class="diagnostics-panel" aria-live="polite">
            <div class="diagnostics-header">
              <span class="diagnostics-title">切片诊断</span>
              <span id="slice-diagnostics-source" class="diagnostics-source">-</span>
            </div>
            <div id="slice-diagnostics-list" class="diagnostics-list">
              <div class="diagnostic-empty">正在加载诊断信息</div>
            </div>
          </section>

          <section id="task-panel" class="task-panel" aria-live="polite">
            <div class="task-header">
              <span class="task-title">任务队列</span>
              <span id="task-count" class="task-count">0 items</span>
            </div>
            <div id="task-list" class="task-list">
              <div class="task-empty">正在加载任务状态</div>
            </div>
          </section>

          <div id="error" class="error hidden"></div>
          <div class="workbench">
            <section class="panel slice-list" aria-label="slice candidates">
              <div class="panel-header">
                <span class="panel-title">&#20505;&#36873;&#20999;&#29255;</span>
                <span class="panel-meta" id="slice-count">0 items</span>
              </div>
              <div class="panel-body" id="slice-list"></div>
            </section>
            <section class="panel preview-panel">
              <div class="panel-header">
                <span class="panel-title">&#39044;&#35272;</span>
                <span class="panel-meta" id="file-size">-</span>
              </div>
              <div class="panel-body">
                <video id="preview-video" class="preview-video" controls preload="metadata"></video>
                <div class="metadata-grid">
                  <label>&#26469;&#28304;</label><span id="source-recording">-</span>
                  <label>&#23494;&#24230;&#26680;&#24515;</label><span id="density-core">-</span>
                  <label>&#19978;&#19979;&#25991;&#31383;&#21475;</label><span id="context-window">-</span>
                  <label>&#24377;&#24149;&#25968;</label><span id="danmaku-count">-</span>
                  <label>&#29190;&#28857;&#25490;&#21517;</label><span id="burst-rank">-</span>
                  <label>&#23792;&#20540;&#20493;&#29575;</label><span id="burst-ratio">-</span>
                  <label>&#36136;&#37327;&#20998;</label><span id="quality-score">-</span>
                </div>
              </div>
            </section>
            <section class="panel feedback-panel" aria-label="manual feedback">
              <div class="panel-header">
                <span class="panel-title">&#20154;&#24037;&#21028;&#26029;</span>
              </div>
              <div class="panel-body feedback-body">
                <div class="decision-group">
                  <button data-decision="review" type="button">review</button>
                  <button data-decision="keep" type="button">keep</button>
                  <button data-decision="drop" type="button">drop</button>
                </div>
                <label class="field">
                  <span>&#21407;&#22240;</span>
                  <textarea id="quality-reason" rows="5"></textarea>
                </label>
                <div class="range-row">
                  <label class="field"><span>&#20837;&#28857;</span><input id="manual-start" type="number" min="0" step="0.1" /></label>
                  <label class="field"><span>&#20986;&#28857;</span><input id="manual-end" type="number" min="0" step="0.1" /></label>
                </div>
                <button id="save-button" class="btn-primary" type="button">&#20445;&#23384;&#21453;&#39304;</button>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>
    <script src="/app.js?v=20260602"></script>
  </body>
</html>
