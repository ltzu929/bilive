<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bilive dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/cache-reset.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">B</div>
          <span>bilive</span>
        </div>
        <nav>
          <a class="nav-item" href="http://192.168.31.157:2233/tasks">录播控制台</a>
          <a class="nav-item active" href="/tasks">切片</a>
          <span class="nav-item disabled" aria-disabled="true">上传</span>
          <span class="nav-item disabled" aria-disabled="true">设置</span>
        </nav>
      </aside>
      <main class="main">
        <section class="page">
          <header class="toolbar">
            <div>
              <h1>切片</h1>
              <p>预览候选片段，记录保留、丢弃和待精切判断。</p>
            </div>
            <div class="toolbar-controls">
              <input id="room-filter" placeholder="房间号" />
              <select id="status-filter">
                <option value="all">全部</option>
                <option value="review">待确认</option>
                <option value="keep">保留</option>
                <option value="drop">丢弃</option>
              </select>
              <button id="refresh-button" type="button">刷新</button>
            </div>
          </header>
          <div id="error" class="error hidden"></div>
          <div class="workbench">
            <section class="slice-list" aria-label="候选切片">
              <div class="list-header"><span id="slice-count">0 个候选</span></div>
              <div id="slice-list"></div>
            </section>
            <section class="preview-panel">
              <video id="preview-video" class="preview-video" controls preload="metadata"></video>
              <div class="metadata-grid">
                <label>来源</label><span id="source-recording">-</span>
                <label>密度核心</label><span id="density-core">-</span>
                <label>上下文窗口</label><span id="context-window">-</span>
                <label>文件大小</label><span id="file-size">-</span>
              </div>
            </section>
            <section class="feedback-panel" aria-label="人工反馈">
              <h2>人工判断</h2>
              <div class="decision-group">
                <button data-decision="review" type="button">review</button>
                <button data-decision="keep" type="button">keep</button>
                <button data-decision="drop" type="button">drop</button>
              </div>
              <label class="field">
                <span>原因</span>
                <textarea id="quality-reason" rows="5"></textarea>
              </label>
              <div class="range-row">
                <label><span>入点</span><input id="manual-start" type="number" min="0" step="0.1" /></label>
                <label><span>出点</span><input id="manual-end" type="number" min="0" step="0.1" /></label>
              </div>
              <button id="save-button" class="primary" type="button">保存反馈</button>
            </section>
          </div>
        </section>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
