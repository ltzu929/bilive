<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bilive dashboard</title>
    <link rel="stylesheet" href="/styles.css?v=20260603-3" />
    <script src="/cache-reset.js"></script>
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">B</div>
          <span class="brand-text">bilive</span>
        </div>
        <nav>
          <a class="nav-item" href="http://192.168.31.157:2233/tasks">
            <span class="nav-icon" data-icon="record"></span>
            <span class="nav-text">录播控制台</span>
          </a>
          <a class="nav-item active" href="/tasks">
            <span class="nav-icon" data-icon="scissor"></span>
            <span class="nav-text">切片</span>
          </a>
          <span class="nav-item disabled" aria-disabled="true">
            <span class="nav-icon" data-icon="upload"></span>
            <span class="nav-text">上传</span>
          </span>
          <span class="nav-item disabled" aria-disabled="true">
            <span class="nav-icon" data-icon="setting"></span>
            <span class="nav-text">设置</span>
          </span>
        </nav>
        <div class="sider-trigger" id="sider-toggle" role="button" aria-label="collapse sidebar">
          <span class="nav-icon" data-icon="fold"></span>
        </div>
      </aside>

      <main class="main">
        <section class="page">
          <header class="toolbar">
            <div class="toolbar-left">
              <nav class="breadcrumb" aria-label="breadcrumb">
                <span class="breadcrumb-item">bilive</span>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-item current">切片</span>
              </nav>
              <h1>切片</h1>
              <p>预览录播、弹幕密度和 LLM 判断结果。</p>
            </div>
            <div class="toolbar-controls">
              <select id="room-filter">
                <option value="">全部 UP</option>
              </select>
              <select id="status-filter">
                <option value="all">全部</option>
                <option value="review">待确认</option>
                <option value="keep">保留</option>
                <option value="drop">丢弃</option>
              </select>
              <span id="worker-badge" class="worker-badge worker-idle" title="PC worker 状态">PC worker: 未知</span>
              <button id="start-slice-button" class="btn-primary" type="button">启动切片</button>
              <button id="refresh-button" type="button">刷新</button>
            </div>
          </header>

          <section id="slice-progress-panel" class="progress-panel" aria-live="polite">
            <div class="progress-main">
              <div>
                <div id="slice-progress-title" class="progress-title">空闲</div>
                <div id="slice-progress-message" class="progress-message">暂无切片任务</div>
              </div>
              <div class="progress-meta">
                <span id="slice-progress-source">-</span>
                <span id="slice-progress-count">0/0</span>
                <span id="slice-progress-percent">0%</span>
              </div>
            </div>
            <div class="progress-track">
              <div id="slice-progress-bar" class="progress-fill" style="width: 0%"></div>
            </div>
          </section>

          <section id="slice-diagnostics-panel" class="diagnostics-panel" aria-live="polite">
            <div class="diagnostics-header">
              <span class="diagnostics-title">切片诊断</span>
              <span id="slice-diagnostics-source" class="diagnostics-source">-</span>
            </div>
            <div id="slice-diagnostics-list" class="diagnostics-list">
              <div class="diagnostic-empty">正在加载诊断信息</div>
            </div>
          </section>

          <section id="task-panel" class="task-panel" aria-live="polite">
            <div class="task-header">
              <span class="task-title">任务队列</span>
              <button id="task-toggle" class="task-toggle" type="button" aria-expanded="true">折叠</button>
              <span id="task-count" class="task-count">0 items</span>
            </div>
            <div id="task-list" class="task-list">
              <div class="task-empty">正在加载任务状态</div>
            </div>
          </section>

          <div id="error" class="error hidden"></div>

          <div class="legacy-slice-hidden hidden" aria-hidden="true">
            <span id="slice-count">0 items</span>
            <div id="slice-list"></div>
            <video id="preview-video"></video>
            <span id="file-size">-</span>
            <span id="density-core">-</span>
            <span id="context-window">-</span>
            <span id="burst-rank">-</span>
          </div>

          <div class="workbench source-workbench">
            <section class="panel source-list-panel" aria-label="source recordings">
              <div class="panel-header">
                <span class="panel-title">录播视频</span>
                <span class="panel-meta" id="source-recording-count">0 items</span>
              </div>
              <div class="panel-body" id="source-recording-list"></div>
            </section>

            <section class="panel source-preview-panel">
              <div class="panel-header">
                <span class="panel-title">预览</span>
                <span class="panel-meta" id="source-file-size">-</span>
              </div>
              <div class="panel-body">
                <video id="source-preview-video" class="preview-video" controls preload="metadata"></video>
                <div class="density-chart-shell">
                  <svg id="density-chart" class="density-chart" viewBox="0 0 100 40" preserveAspectRatio="none" aria-label="弹幕密度图">
                    <path class="density-area" d=""></path>
                    <g id="density-segment-layer"></g>
                  </svg>
                </div>
                <div class="metadata-grid">
                  <label>来源</label><span id="source-recording">-</span>
                  <label>状态</label><span id="source-status">-</span>
                  <label>判断</label><span id="source-summary">-</span>
                  <label>片段</label><span id="selected-segment-range">-</span>
                  <label>弹幕数</label><span id="danmaku-count">-</span>
                  <label>峰值倍率</label><span id="burst-ratio">-</span>
                  <label>质量分</label><span id="quality-score">-</span>
                </div>
              </div>
            </section>

            <section id="segment-panel" class="panel segment-panel" aria-label="manual segment handling">
              <div class="panel-header">
                <span class="panel-title">人工判断</span>
                <span id="segment-status" class="panel-meta">-</span>
              </div>
              <div class="panel-body feedback-body">
                <label class="field"><span>标题</span><input id="segment-title" type="text" /></label>
                <label class="field"><span>描述</span><textarea id="segment-description" rows="3"></textarea></label>
                <label class="field">
                  <span>原因</span>
                  <textarea id="quality-reason" rows="5"></textarea>
                </label>
                <div class="range-row">
                  <label class="field"><span>入点</span><input id="manual-start" type="number" min="0" step="0.1" /></label>
                  <label class="field"><span>出点</span><input id="manual-end" type="number" min="0" step="0.1" /></label>
                </div>
                <div class="segment-actions">
                  <button id="segment-keep-button" class="btn-primary" type="button">keep</button>
                  <button id="segment-drop-button" class="btn-danger" type="button">drop</button>
                  <button id="save-button" type="button">保存区间</button>
                  <button id="segment-retry-button" type="button">retry LLM</button>
                  <button id="segment-render-button" type="button">render</button>
                </div>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>
    <script src="/app.js?v=20260603-3"></script>
  </body>
</html>
