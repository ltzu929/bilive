# bilive-agent.toml — Pi 端精简配置
# 无 GPU/模型依赖，Pi 上不跑任何重型处理

[recording]
# 录制输出目录（NFS 挂载路径，指向 PC 的磁盘）
# Pi 上: /mnt/win/bilive/Videos
# 环境变量 BILIVE_VIDEOS_DIR 可覆盖此项
videos_dir = "/mnt/win/bilive/Videos"

# 日志目录（也指向 NFS 挂载）
log_dir = "/mnt/win/bilive/logs"

# 扫描配置
[scan]
# 扫描间隔（秒）
interval = 120

# 最小视频大小（MB），低于此值的视频不触发处理
min_video_size = 20

# 视频信息（写入 .pending 标记的元数据）
[video]
title = "{artist}直播-{date}"
description = "录制请征求主播同意，若未经同意就录制，所引起的任何法律问题均由该违规录制的 b 站账号承担。"
tid = 138
gift_price_filter = 1
upload_line = "auto"