[dashboard.remote_worker]
enabled = true
timeout = 10
startup_timeout = 30
task_name = "BiliveWorkerApi"

[worker]
idle_timeout_seconds = 900
idle_check_interval_seconds = 30

[video]
title = "{artist}直播-{date}"
description = "直播录制切片，来源见转载信息。"
tid = 138
upload_line = "auto"

[upload]
auto_start = true
poll_interval_seconds = 10
max_attempts = 3
retry_base_seconds = 30
auth_retry_seconds = 120
delete_after_success = true

[slice]
min_video_size = 100

[slice.burst]
burst_ratio = 3.0
burst_window = 10
burst_context = 120
burst_merge_gap = 5
burst_top_n = 3

[slice.llm_judge]
provider = "managed-llama-server"
local_command = []
timeout = 120
model_path = "E:\\AImodel\\lmstudio-community\\Qwen3.5-9B-GGUF\\Qwen3.5-9B-Q4_K_M.gguf"
server_path = ".runtime\\llama.cpp\\b9616\\llama-server.exe"
host = "127.0.0.1"
port = 2236
context_size = 4096
gpu_layers = "all"
parallel = 1
startup_timeout = 180
shutdown_timeout = 15

[slice.multi_modal]
visual_model_url = "http://127.0.0.1:2236/v1"
visual_model_name = "qwen3.5-9b"
whisper_model = "large-v3"
whisper_engine = "faster-whisper"
whisper_device = "cpu"
whisper_compute_type = "int8"
unload_audio_model_after_analysis = true

[slice.mimo]
model = "mimo-v2.5"
base_url = "https://api.xiaomimimo.com/v1"
fps = 1.0
media_resolution = "default"
timeout = 180
max_base64_bytes = 48000000

[slice.analysis]
write_analysis_json = true

[slice.edit]
enable_edit_instruction = true
enable_prompt_package = false
max_subtitle_evidence = 6
default_highlight_window = 12
